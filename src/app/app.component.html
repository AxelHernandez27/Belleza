<header class="navbar">
  <div class="navbar-logo">
    <img src="assets/Diseño_edith__2.png" alt="Edith Manrique MakeUp Artist Logo">
  </div>

  <nav class="navbar-links">
   <a routerLink="/inicio"
   routerLinkActive="active"
   [routerLinkActiveOptions]="{ exact: true }">
  {{ 'NAVBAR.HOME' | translate }}
</a>

<a routerLink="/servicios"
   routerLinkActive="active">
  {{ 'NAVBAR.SERVICES' | translate }}
</a>

<a routerLink="/unas"
   routerLinkActive="active">
  {{ 'NAVBAR.NAILS' | translate }}
</a>

<a routerLink="/pestanas"
   routerLinkActive="active">
  {{ 'NAVBAR.LASHES' | translate }}
</a>

<a routerLink="/portafolio"
   routerLinkActive="active">
  {{ 'NAVBAR.PORTFOLIO' | translate }}
</a>

<a routerLink="/contacto"
   routerLinkActive="active">
  {{ 'NAVBAR.CONTACT' | translate }}
</a>
  </nav>

  <div class="lang-switch">
    <button (click)="cambiarIdioma('es')" [class.active]="idiomaSeleccionado === 'es'">
      🇲🇽 ES
    </button>

    <button (click)="cambiarIdioma('en')" [class.active]="idiomaSeleccionado === 'en'">
      🇺🇸 EN
    </button>
  </div>

  <div *ngIf="mostrarMensajeDesliza" class="mensaje-desliza">
    <span>{{ 'UI.SCROLL_MESSAGE' | translate }}</span>
  </div>
</header>

<div class="loading-language" *ngIf="cargandoIdioma">
  <div class="loading-box">
    <div class="spinner"></div>

    <p *ngIf="idiomaSeleccionado === 'es'">
      Cambiando idioma...
    </p>

    <p *ngIf="idiomaSeleccionado === 'en'">
      Changing language...
    </p>
  </div>
</div>

<main>
  <router-outlet></router-outlet>
</main>
